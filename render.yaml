# Render Blueprint — deploy from https://dashboard.render.com/blueprints
# Connect this GitHub repo, then set CORS_ORIGIN to your Vercel URL after frontend deploys.

databases:
  - name: campus360-db
    plan: free
    databaseName: campus360
    user: campus360

services:
  - type: web
    name: campus360-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install --include=dev && bash scripts/render-build.sh
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: campus360-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: CAMPUS360_AGENT_API_KEY
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: MICROSOFT_DIRECT_LINE_SECRET
        sync: false
